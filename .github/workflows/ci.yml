name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.423
            10.0.302
      - run: dotnet restore TesseractRuntime.slnx
      - run: dotnet format TesseractRuntime.slnx --verify-no-changes --no-restore
      - run: dotnet build TesseractRuntime.slnx -c Release --no-restore
      - run: dotnet test tests/TesseractRuntime.Tests/TesseractRuntime.Tests.csproj -c Release --no-build
      - name: Enforce managed policy coverage
        if: runner.os == 'Linux'
        run: >-
          dotnet test tests/TesseractRuntime.Tests/TesseractRuntime.Tests.csproj -c Release --no-build
          --framework net10.0
          /p:CollectCoverage=true
          /p:CoverletOutput=artifacts/coverage/
          /p:CoverletOutputFormat=json
          /p:ExcludeByFile='**/Native/**/*.cs%2c**/TesseractRuntimeInfo.cs%2c**/LibraryImports.g.cs'
          /p:Threshold=96
          /p:ThresholdType=line%2cbranch
      - run: dotnet run --project tests/TesseractRuntime.Conformance/TesseractRuntime.Conformance.csproj -c Release --no-build
      - name: Audit NuGet dependencies
        shell: pwsh
        run: |
          $reports = dotnet list TesseractRuntime.slnx package --vulnerable --include-transitive --format json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "NuGet audit failed with exit code $LASTEXITCODE." }
          $vulnerable = @($reports.projects | ForEach-Object {
            $_.frameworks | ForEach-Object {
              @($_.topLevelPackages) + @($_.transitivePackages)
            }
          }) | Where-Object { $_.vulnerabilities -and $_.vulnerabilities.Count -gt 0 }
          if ($vulnerable.Count -gt 0) { throw 'A vulnerable NuGet dependency was detected.' }
      - name: Exercise system Tesseract 5
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libtesseract-dev tesseract-ocr-eng
          mkdir -p artifacts/integration tessdata
          curl --fail --location --output artifacts/integration/phototest.tif https://raw.githubusercontent.com/tesseract-ocr/test/232ff181c66516116ec0e84c4963f70de15050fd/testing/phototest.tif
          cp /usr/share/tesseract-ocr/5/tessdata/eng.traineddata tessdata/eng.traineddata
          cp /usr/share/tesseract-ocr/5/tessdata/osd.traineddata tessdata/osd.traineddata
          # Ubuntu 24.04 currently carries Tesseract 5.3.4, which predates its PAGE C export.
          # The pinned 5.5.2 native matrix below exercises PAGE XML on every release RID.
          dotnet run --project tests/TesseractRuntime.Integration/TesseractRuntime.Integration.csproj -c Release --no-build -- tessdata artifacts/integration/phototest.tif "This is a lot" --without-page-xml
      - name: Pack managed packages
        shell: pwsh
        run: |
          dotnet pack src/TesseractRuntime/TesseractRuntime.csproj -c Release --no-build -o artifacts/packages
          if ($LASTEXITCODE -ne 0) { throw "Core package build failed with exit code $LASTEXITCODE." }
          dotnet pack src/TesseractRuntime.ImageSharp/TesseractRuntime.ImageSharp.csproj -c Release --no-build -o artifacts/packages
          if ($LASTEXITCODE -ne 0) { throw "ImageSharp package build failed with exit code $LASTEXITCODE." }
          dotnet pack src/TesseractRuntime.SkiaSharp/TesseractRuntime.SkiaSharp.csproj -c Release --no-build -o artifacts/packages
          if ($LASTEXITCODE -ne 0) { throw "SkiaSharp package build failed with exit code $LASTEXITCODE." }
          eng/test-managed-packages.ps1 -PackageDirectory artifacts/packages
      - name: Publish and execute Native AOT smoke
        shell: pwsh
        run: |
          $arm64 = [Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq [Runtime.InteropServices.Architecture]::Arm64
          $rid = if ($IsWindows) { if ($arm64) { 'win-arm64' } else { 'win-x64' } } elseif ($IsMacOS) { if ($arm64) { 'osx-arm64' } else { 'osx-x64' } } else { if ($arm64) { 'linux-arm64' } else { 'linux-x64' } }
          dotnet publish tests/TesseractRuntime.AotSmoke/TesseractRuntime.AotSmoke.csproj -c Release -r $rid -o artifacts/aot
          if ($LASTEXITCODE -ne 0) { throw "Native AOT publish failed with exit code $LASTEXITCODE." }
          if ($IsWindows) { & artifacts/aot/TesseractRuntime.AotSmoke.exe } else { & artifacts/aot/TesseractRuntime.AotSmoke }
          if ($LASTEXITCODE -ne 0) { throw "Native AOT smoke failed with exit code $LASTEXITCODE." }
      - uses: actions/upload-artifact@v6
        if: runner.os == 'Linux'
        with:
          name: managed-packages
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error
