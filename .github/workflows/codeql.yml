name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 8 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
      - run: dotnet build TesseractRuntime.slnx -c Release
      - uses: github/codeql-action/analyze@v4
